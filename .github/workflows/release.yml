name: Release

# Publishes a signed AAB (for Play Store) and APK (for sideloading) whenever a
# version tag is pushed, e.g.  git tag v1.0.0 && git push origin v1.0.0
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64     base64 of your upload keystore  (base64 -w0 upload.jks)
#   KEYSTORE_PASSWORD   keystore password
#   KEY_ALIAS           key alias
#   KEY_PASSWORD        key password
# Without them the job still builds, but the artifacts are unsigned.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/upload.jks" >> "$GITHUB_ENV"
            echo "Keystore decoded — release build will be signed."
          else
            echo "No KEYSTORE_BASE64 secret — release build will be UNSIGNED."
          fi

      - name: Build AAB and APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease assembleRelease

      - name: Collect artifacts
        run: |
          mkdir -p dist
          cp app/build/outputs/bundle/release/app-release.aab dist/ 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release.apk dist/ 2>/dev/null || true
          cp app/build/outputs/apk/release/app-release-unsigned.apk dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sparkora-staff-release
          path: dist/

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
