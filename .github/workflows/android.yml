name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Lint
        run: ./gradlew --no-daemon lintDebug

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Build release APK (R8/proguard check)
        run: ./gradlew --no-daemon assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sparkora-staff-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test and lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            app/build/reports/tests/
            app/build/reports/lint-results-debug.html

  emulator-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented smoke tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          # The runner executes each script line as a separate process, so the
          # whole test-then-extract sequence must be one line to share state.
          # Screenshots live in the app's INTERNAL filesDir, extracted via
          # run-as (works because the debug build is debuggable); the external
          # dir isn't adb-pullable under API 34 scoped storage.
          script: ./gradlew --no-daemon connectedDebugAndroidTest; s=$?; mkdir -p app-screenshots; for f in $(adb exec-out run-as com.sparkora.app ls files/screenshots 2>/dev/null); do adb exec-out run-as com.sparkora.app cat "files/screenshots/$f" > "app-screenshots/$f"; done; ls -la app-screenshots/; exit $s

      - name: Upload app screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-screenshots
          path: app-screenshots/

      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-reports
          path: app/build/reports/androidTests/
